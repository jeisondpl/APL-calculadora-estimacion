version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: apl_calculadora_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apl_pass}
      POSTGRES_DB: ${POSTGRES_DB:-apl_calculadora}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apl_user} -d ${POSTGRES_DB:-apl_calculadora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
